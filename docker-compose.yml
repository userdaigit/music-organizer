# docker-compose.yml - 音乐整理工具 Docker 部署配置
# ============================================================
# 使用方法:
#   1. 将 docker-compose.yml 和整个 music-organizer 文件夹放在同一目录
#   2. 按你的实际路径修改下方 volumes 映射
#   3. 可选: 设置 ACOUSTID_API_KEY 环境变量启用音频指纹
#   4. docker-compose up --rm
#   5. 附加参数: docker-compose run --rm music-organizer --scrape --fingerprint
#
# 平台支持:
#   x86_64 (Intel/AMD): 直接使用
#   ARM (群晖/树莓派): 需在 Dockerfile FROM 行指定 ARM 架构镜像
# ============================================================

version: "3.8"

services:
  music-organizer:
    build: ./github-release
    container_name: music-organizer
    # 如需限制资源（群晖等低内存设备可取消注释）
    # mem_limit: 2g
    # cpus: 2
    volumes:
      # >>> 修改下方路径为你的实际音乐目录 <<<
      - /path/to/your/music:/music:ro        # 源音乐目录（只读挂载）
      - /path/to/your/output:/music2          # 输出目录
      - ./config:/config                       # 配置目录（name_map.json 等）
    environment:
      - LANG=zh_CN.UTF-8
      - LC_ALL=zh_CN.UTF-8
      # >>> 可选: 设置 AcoustID API KEY 启用音频指纹识别 <<<
      # 在 https://acoustid.org/api-key 申请免费 KEY
      # - ACOUSTID_API_KEY=YOUR_ACOUSTID_API_KEY_HERE
    # 默认执行整理（不含刮削/指纹），附加参数通过 docker-compose run 传入
    command: ["--source", "/music", "--output", "/music2", "--name-map", "/config/name_map.json", "--write-tags"]
